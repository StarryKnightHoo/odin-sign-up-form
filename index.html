<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel='stylesheet' href='styles.css'/>
</head>
<body>
   <div class="side-bar">
    <div class="caption">
        <img class="logo" src="odin-lined.png" alt="Odin Project Logo">
        <div class="caption-message">ODIN</div>
    </div>
    <div class="credits">
        Photo by <a href="https://unsplash.com/@kalenemsley">Kalen Emsley</a> on <a href="https://unsplash.com/s/photos/mountains">Unsplash</a>
    </div>
   </div>

   <div class="right-side">
    <form action="" method="post">
        <div class="header">
            This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started. <br><br> You <em>know you want to.</em>
        </div>

        <div class="information">
            <span class="form-header">Let's do this!</span>
            <div class="names">
                <div>
                    <label for="first_name">FIRST NAME</label>
                    <input type="text" id="first_name" name="first-name" placeholder="Thor">
                </div>

                <div>
                    <label for="last_name">LAST NAME</label>
                    <input type="text" id="last_name" name="last-name" placeholder="Odinson">
                </div>
            </div>
            <div class="mail-and-phone">
                <div>
                    <label for="email">EMAIL</label>
                    <input type="email" id="email" name="email">
                </div>
                <div>
                    <label for="phone">PHONE NUMBER</label>
                    <input type="tel" id="phone" name="phone">
                </div>
            </div>
            <div class="passwords">
                <div>
                    <label for="password">PASSWORD</label>
                    <input type="password" id="password" name="password">
                </div>
                <div>
                    <label for="confirm">CONFIRM PASSWORD</label>
                    <input type="password" id="confirm" name="confirm">
                </div>
            </div>
        </div>

        <div class="Submit">
            <button type="submit">Create Account</button>
            <div class="login">Already have an account? <span class="log">Log in</span></div>
        </div>
    </form>
   </div>
</body>
</html>
